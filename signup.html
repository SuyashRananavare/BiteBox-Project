<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/e150400852.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles/style.css">
    <title>Signup Page</title>
</head>
<body>
     <header>
        <nav>
            <img src="images/logo.png" alt="BiteBox logo">
            <ul>
                <li><a href="index.html"> Home <i class="fa-solid fa-house"></i></a></li>
                <li class="login-btn"><a href="login.html">Login <i class="fa-solid fa-arrow-right-to-bracket"></i></a></li>
            </ul>
        </nav> 
    </header>

     <section class="auth-container">
        <div class="auth-box">
            <h2>Create Account</h2>
            <form>
                <input type="text" placeholder="Enter Name" required>
                <input type="email" placeholder="Enter Email" required>
                <input type="password" placeholder="Enter password" required>
                <input type="password" placeholder="Confirm password" required>
                <button>Register</button>
            </form>
            <p>Already have an account <a href="login.html">Login</a></p>
        </div>
    </section>
</body>
</html>
